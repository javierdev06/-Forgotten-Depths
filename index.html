<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Forgotten Depths</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }

    /* ── MENÚ PRINCIPAL ── */
    #main-menu {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 1.5s;
    }

    #menu-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(ellipse at center,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0.70) 55%,
        rgba(0,0,0,0.93) 100%);
    }

    #menu-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    #menu-title {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .title-forgotten {
      font-family: 'Cinzel Decorative', serif;
      font-size: 48px;
      font-weight: 700;
      color: #c8a951;
      text-shadow:
        0 0 20px rgba(200,169,81,0.8),
        0 0 40px rgba(200,169,81,0.4),
        2px 2px 8px rgba(0,0,0,0.9);
      letter-spacing: 8px;
    }

    .title-depths {
      font-family: 'Cinzel Decorative', serif;
      font-size: 80px;
      font-weight: 900;
      color: #e8c96a;
      text-shadow:
        0 0 30px rgba(232,201,106,0.9),
        0 0 60px rgba(232,201,106,0.5),
        3px 3px 12px rgba(0,0,0,0.95);
      letter-spacing: 12px;
      margin-top: -12px;
    }

    .title-divider {
      font-size: 14px;
      color: #7a5a1a;
      letter-spacing: 6px;
      margin-top: 10px;
      text-shadow: 0 0 10px rgba(138,106,42,0.5);
    }

    #menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      margin-top: 10px;
    }

    .menu-btn {
      font-family: 'Cinzel', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 4px;
      color: #d4a843;
      background: linear-gradient(135deg,
        rgba(15,8,2,0.88) 0%,
        rgba(35,20,5,0.88) 50%,
        rgba(15,8,2,0.88) 100%);
      border: 1px solid rgba(200,169,81,0.35);
      border-top: 1px solid rgba(200,169,81,0.65);
      border-bottom: 1px solid rgba(200,169,81,0.65);
      padding: 15px 0;
      width: 320px;
      cursor: pointer;
      transition: all 0.3s ease;
      clip-path: polygon(14px 0%, calc(100% - 14px) 0%, 100% 50%, calc(100% - 14px) 100%, 14px 100%, 0% 50%);
      text-shadow: 0 0 10px rgba(212,168,67,0.5);
      text-transform: uppercase;
    }

    .menu-btn:hover {
      color: #fff8dd;
      border-color: rgba(200,169,81,0.95);
      background: linear-gradient(135deg,
        rgba(55,30,5,0.92) 0%,
        rgba(75,45,8,0.92) 50%,
        rgba(55,30,5,0.92) 100%);
      text-shadow:
        0 0 15px rgba(255,248,221,0.9),
        0 0 30px rgba(200,169,81,0.6);
      transform: scaleX(1.05);
      box-shadow: 0 0 25px rgba(200,169,81,0.25);
    }

    .menu-btn:active {
      transform: scaleX(0.97);
    }

    .btn-icon {
      margin-right: 12px;
      opacity: 0.8;
    }

    #menu-footer {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      color: rgba(120,90,30,0.45);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    /* ── HUD / INTERACT ── */
    #interact-prompt {
      display: none;
      position: fixed;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-family: sans-serif;
      font-size: 18px;
      background: rgba(0,0,0,0.5);
      padding: 8px 16px;
      border-radius: 4px;
      z-index: 50;
    }

    #wall-message {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85);
      color: #ff4400;
      font-family: serif;
      font-size: 24px;
      padding: 30px 50px;
      border: 1px solid #ff4400;
      text-align: center;
      border-radius: 4px;
      z-index: 50;
    }
  </style>
</head>
<body>

  <!-- MENÚ PRINCIPAL -->
  <div id="main-menu">
    <div id="menu-overlay"></div>
    <div id="menu-content">
      <div id="menu-title">
        <span class="title-forgotten">Forgotten</span>
        <span class="title-depths">Depths</span>
        <div class="title-divider">⬥ ──────────────── ⬥</div>
      </div>
      <div id="menu-buttons">
        <button class="menu-btn" id="btn-new-game">
          Nueva Partida
        </button>
        <button class="menu-btn" id="btn-continue">
          Continuar
        </button>
        <button class="menu-btn" id="btn-options">
          Opciones
        </button>
      </div>
      <div id="menu-footer">~ FORGOTTEN DEPTHS ~</div>
    </div>
  </div>

  <!-- HUD -->
  <div id="interact-prompt">Presiona <kbd>E</kbd> para leer</div>

  <div id="wall-message">
    "No bajen más.<br/>Ya despertó."
    <br/><br/>
    <small style="color:#aaa;font-size:14px">Presiona E para cerrar</small>
  </div>

  <canvas id="game-canvas"></canvas>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
